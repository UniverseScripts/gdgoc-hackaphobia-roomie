version: "3.9"

services:
  # ── FastAPI Backend (Firebase) ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: roomie_backend
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:-change_this_in_production_please}
      ALGORITHM: HS256
      GOOGLE_APPLICATION_CREDENTIALS: /app/serviceAccountKey.json
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  # ── Vite + React Frontend ─────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: roomie_frontend
    working_dir: /app
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
