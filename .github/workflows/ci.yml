name: CI/CD Production Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache npm dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Verify Environment Ingestion Pipeline
        env:
          VITE_FIREBASE_CONFIG: ${{ secrets.VITE_FIREBASE_CONFIG }}
          VITE_API_GATEWAY_URL: ${{ secrets.VITE_API_GATEWAY_URL }}
        run: |
          MISSING=()
          [ -z "$VITE_FIREBASE_CONFIG" ] && MISSING+=("VITE_FIREBASE_CONFIG")
          [ -z "$VITE_API_GATEWAY_URL" ] && MISSING+=("VITE_API_GATEWAY_URL")
          
          if [ ${#MISSING[@]} -ne 0 ]; then
            echo "CRITICAL FAILURE: The following secrets are missing from the vault: ${MISSING[*]}"
            exit 1
          else
            echo "SUCCESS: The aggregated configuration and gateway URL have successfully breached the pipeline."
          fi

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build Vite SPA Sandbox
        working-directory: ./frontend
        env:
          VITE_FIREBASE_CONFIG: ${{ secrets.VITE_FIREBASE_CONFIG }}
          VITE_API_GATEWAY_URL: ${{ secrets.VITE_API_GATEWAY_URL }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.GCP_PROJECT_ID }}
          channelId: live

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        # Ensure your target region supports global scalability. 
        # Since you prioritize global potentials, multi-region routing is optimal.
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push Docker Image
        run: |
          docker build -t us-central1-docker.pkg.dev/hackaphobia-roomie/roomie-repo/roomie-backend:${{ github.sha }} ./backend
          docker push us-central1-docker.pkg.dev/hackaphobia-roomie/roomie-repo/roomie-backend:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: roomie-backend
          region: us-central1
          image: us-central1-docker.pkg.dev/hackaphobia-roomie/roomie-repo/roomie-backend:${{ github.sha }}  
          flags: '--allow-unauthenticated --service-account=firebase-adminsdk-fbsvc@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com'
