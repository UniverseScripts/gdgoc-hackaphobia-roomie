name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  deploy-firebase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Set Cloud Function Environment Variables
        run: |
          # Bind the GCP Project ID to the Cloud Function execution environment
          echo "GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" > functions/.env

      - name: Deploy to Firebase Functions
        run: firebase deploy --only functions
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}